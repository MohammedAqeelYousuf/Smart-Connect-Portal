<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Smart Campus Connect</title>
  <link rel="stylesheet" href="../../styles/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>

  <!-- Navbar Section -->
  <header>
      <nav class="navbar navbar-bg text-white">
       <div class="container-fluid">
          <a href="/pages/index.html" class="navbar-brand text-white">Connect Portal</a>
          <div>
            <a class="text-decoration-none" href="login.html">
              <button id="login-button" class="btn btn-outline-success">Login</button>
            </a>
            <a class="text-decoration-none" href="register.html">
              <button id="signup-button" class="btn btn-outline-primary">Signup</button>
            </a>
          </div>
        </div>
      </nav>
  </header>

  <div class="signup-wrapper">
   
      
      <div class="form-section">
        <main class="login-container text-white shadow-md">
          <h2>Register Now</h2>
          <h2 id="error-tag"></h2>
          <form id="signup-form" class="login-form">
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name" name="name" required>

            <label for="mailid">Email ID</label>
            <input type="text" id="mailid" placeholder="Enter your mail ID" name="mailid" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password( 1 special charrecter)" name="password" required>

            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Re-enter your password" name="confirmPassword" required>

            <label for="role">Role</label>
            <select name="role" id="role" class="shadow p-1">
              <option value="default" default>Select role</option>
              <option value="student">Student</option>
              <option value="staff">Staff</option>
            </select>

            <button class="btn btn-outline-success text-white">Signup</button>
          </form>
        </main>
      </div>
    </div>
  </div>

  <!-- Footer Section -->
  <footer class="bg-body-tertiary py-3">
    <div class="container text-center">
      <p>&copy; 2025 Connect Portal. All rights reserved.</p>
      <ul class="list-inline">
        <li class="list-inline-item"><a href="/contact" class="text-decoration-none">Contact</a></li>
        <li class="list-inline-item"><a href="/privacy-policy" class="text-decoration-none">Privacy Policy</a></li>
        <li class="list-inline-item"><a href="/terms" class="text-decoration-none">Terms of Service</a></li>
      </ul>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWCozFSxQBxwHKO" crossorigin="anonymous"></script>
  <script src="../../modules/register.js"></script>
</body>
</html>
