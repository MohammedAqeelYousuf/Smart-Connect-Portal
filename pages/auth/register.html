<div class="signup-wrapper">
  <div class="form-section">
    <main class="login-container text-white shadow-md">
      <h2>Register Now</h2>

      <form id="signup-form" class="login-form">
        <label for="name">Name:</label>
        <input
          type="text"
          id="name"
          placeholder="Enter your name"
          name="name"
          required
        />
        <div class="error" id="name-error"></div>

        <label for="mailid">Email ID</label>
        <input
          type="text"
          id="mailid"
          placeholder="Enter your mail ID"
          name="mailid"
          required
        />
        <div class="error" id="email-error"></div>

        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password (1 special character)"
          name="password"
          required
        />
        <div class="error" id="password-error"></div>

        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Re-enter your password"
          name="confirmPassword"
          required
        />
        <div class="error" id="confirm-error"></div>

        <label for="role">Role</label>
        <select name="role" id="role" class="shadow p-1">
          <option value="default" default>Select role</option>
          <option value="student">Student</option>
          <option value="staff">Staff</option>
        </select>
        <div class="error" id="role-error"></div>

        <button class="btn btn-outline-success text-white">Register</button>
      </form>
    </main>
  </div>
</div>

<script src="../../modules/register.js"></script>
