<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Smart Campus Connect</title>
  <link rel="stylesheet" href="../../styles/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>
  

  <main class="login-container text-white shadow-md">
    <h2>Login</h2>
    <h2 id="error-tag"></h2>
    <form id="login-form" class="login-form">
      <label for="mailid">Email ID</label>
      <input type="text" id="mailid" placeholder="Enter your registered Email" name="mailid" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" name="password" required>

      <button class="btn btn-outline-success text-white" type="submit">Login</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
  <script src="../../modules/auth.js"></script>
</body>
</html>
