<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Smart Campus Connect</title>
  <link rel="stylesheet" href="../styles/index.css">
  <link rel="stylesheet" href="../styles/feedback.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  
</head>
<body>
 <body>
  <!-- Navbar Section -->
  <header>
    <nav class="navbar navbar-bg text-white">
      <div class="container-fluid">
        <a class="navbar-brand text-white">Connect Portal</a>
        <div class="">
          <a class="btn btn-primary position-relative" href="/pages/announcement.html">
            Announcements
          </a>
        </div>
      </div>
    </nav>
  </header>

  <section class="d-flex main-content">
    <!-- Sidebar for better navigation experience -->
    <aside class="d-flex flex-column flex-shrink-0 p-3 text-white sidebar text-uppercase">
      <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
          <a href="/pages/home.html" class="nav-link text-white px-3 text-center" aria-current="page">
            Home
          </a>
        </li>
        <li>
          <a href="/pages/events.html" class="nav-link text-white px-3 text-center">
            Events
          </a>
        </li>
        <li>
          <a href="/pages/feedback-form.html" class="nav-link active text-white px-3 text-center" id="openFeedback">
            Feedback
          </a>
        </li>
      </ul>
      <hr>
      <div class="dropdown">
        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser1"
          data-bs-toggle="dropdown" aria-expanded="false">
          <strong>User</strong>
        </a>
        <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser1">
          <li><a class="dropdown-item" href="/pages/profile.html">Profile</a></li>
          <li>
            <hr class="dropdown-divider">
          </li>
          <li class="dropdown-item" onclick="logoutUser()">Sign out</li>
        </ul>
      </div>
    </aside>
    <main class="dashboard  px-4 py-2 main-content">
      <div class="container mt-12">


        <form id="feedbackForm" novalidate>
          <!-- Category -->
          <div class="mb-10">
            <h2 class="mb-1 text-center">Submit Your Feedback</h2>
            <p class="text-center mb-4">Help us improve by sharing your experience, suggestions, or concerns.
            </p>
            <label for="category" class="form-label">Category</label>
            <select class="form-select" id="category" name="category" required>
              <option value="">Select Category</option>
              <option value="website">Website Usability</option>
              <option value="event">Event Feedback</option>
              <option value="announcement">Announcement Feedback</option>
              <option value="general">General Suggestion</option>
              <option value="issue">Report an Issue</option>
            </select>
            <div class="invalid-feedback">Please select a category.</div>
          </div>

          <!-- Subject -->
          <div class="mb-3">
            <label for="subject" class="form-label">Subject</label>
            <input type="text" class="form-control" placeholder="Max 20 words" id="subject" name="subject"
              maxlength="100" required />
            <div class="invalid-feedback" id="subjectError">Subject is required and should not exceed 20 words.</div>
          </div>

          <!-- Message -->
          <div class="mb-3">
            <label for="message" class="form-label">Feedback</label>
            <textarea class="form-control" placeholder="Write your feedback" id="message" name="message" rows="3"
              required></textarea>
            <div class="invalid-feedback" id="messageError">Please enter your feedback.</div>
          </div>

          <!-- Submit -->
          <div class="text-center">
            <button type="submit" class="btn btn-primary">Submit </button>
          </div>
        </form>
      </div>
    </main>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
    crossorigin="anonymous"></script>
  <script src="/modules/form-validation.js"></script>
  <script src="../modules/commonFeature.js"></script>
</body>
</html>
