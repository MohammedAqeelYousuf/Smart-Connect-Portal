<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - Smart Campus Connect</title>
  <link rel="stylesheet" href="/styles/admin-dashboard.css">
  <link rel="stylesheet" href="/styles/index.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <header>
      <nav class="navbar navbar-bg text-white">
        <div class="container-fluid">
          <a class="navbar-brand text-white text-uppercase">Connect Portal</a>
          <div class="">
            <a
              class="btn btn-primary position-relative"
              href="/pages/announcement.html"
            >
              Announcements
            </a>
          </div>
        </div>
      </nav>
    </header>

    <section class="d-flex main-content">
      <!-- Sidebar for better navigation experience -->
      <aside
        class="d-flex flex-column flex-shrink-0 p-3 text-white sidebar text-uppercase"
      >
        <ul class="nav nav-pills flex-column mb-auto">
          <li class="nav-item">
            <a
              href="/pages/admin-dash.html"
              class="nav-link active px-3 text-center"
              aria-current="page"
            >
              Home
            </a>
          </li>
          <li>
            <a
              href="/pages/announcement.html"
              class="nav-link text-white px-3 text-center"
            >
              Announcements
            </a>
          </li>
          <li>
            <a
              href="/pages/events.html"
              class="nav-link text-white px-3 text-center"
            >
              Events
            </a>
          </li>
          <li>
            <a
              href="/pages/view-feedback.html"
              class="nav-link text-white px-3 text-center"
              id="openFeedback"
            >
              View Feedback
            </a>
          </li>
          <!-- <li>
            <a
              href="/pages/resolve-queries.html"
              class="nav-link text-white px-3 text-center"
              id="openFeedback"
            >
              Resolve Queries
            </a>
          </li> -->
        </ul>
        <hr />
        <div class="dropdown">
          <a
            href="#"
            class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
            id="dropdownUser1"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <strong>User</strong>
          </a>
          <ul
            class="dropdown-menu dropdown-menu-dark text-small shadow"
            aria-labelledby="dropdownUser1"
          >
            <li>
              <a class="dropdown-item" href="/pages/profile.html">Profile</a>
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li class="dropdown-item" onclick="logoutUser()">Sign out</li>
          </ul>
        </div>
      </aside>

      <main class="dashboard px-4 py-2 main-content flex-grow-1 bg-light">
      <h2>Dashboard Overview</h2>

      <!-- Stat Cards -->
      <div class="row my-4">
        <div class="col-md-4">
          <div class="card text-white bg-primary mb-3">
            <div class="card-body">
              <h5 class="card-title">Total Students</h5>
              <p id="student-stats" class="card-text fs-4"></p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card text-white bg-success mb-3">
            <div class="card-body">
              <h5 class="card-title">Queries</h5>
              <p id="queries-stats" class="card-text fs-4"></p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card text-white bg-warning mb-3">
            <div class="card-body">
              <h5 class="card-title">Feedback</h5>
              <p id="feedback-stats" class="card-text fs-4"></p>
            </div>
          </div>
        </div>
      </div>

      <!-- Action Sections -->
      <!-- <section class="my-5">
        <h4>Post a New Announcement</h4>
        <textarea class="form-control mb-3" rows="3" placeholder="Type your announcement here..."></textarea>
        <button class="btn btn-primary">Submit</button>
      </section> -->

      <section class="my-5">
        <h4>Latest Feedback</h4>
        <ul id="feedback-content" class="list-group">
          <!-- Dynamically loading latest 3 feedbacks -->
        </ul>
      </section>
    </main>
  </div>
  <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
    <script src="../modules/commonFeature.js"></script>
    <script src="../modules/admin-dashboard.js"></script>
</body>
</html>
