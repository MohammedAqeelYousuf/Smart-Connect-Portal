<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>College Feedback Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.0.0/dist/css/coreui.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container my-5">
    <div class="bg-white p-4 rounded shadow-sm mx-auto" style="max-width: 600px;">
      <h2 class="text-center mb-4">Submit Your Feedback</h2>
      <form id="feedbackForm">
        <div class="mb-3">
          <label for="category" class="form-label fw-bold">Category</label>
          <select class="form-select" id="category" required>
            <option value="" selected disabled>Select a category</option>
            <option value="Announcements">Announcements</option>
            <option value="Events">Events</option>
            <option value="Others">Others</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="title" class="form-label fw-bold">Feedback Title</label>
          <input type="text" class="form-control" id="title" placeholder="Enter a short title" required>
        </div>

        <div class="mb-3">
          <label for="description" class="form-label fw-bold">Detailed Feedback</label>
          <textarea class="form-control" id="description" rows="4" placeholder="Write your feedback here..." required></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Rating</label>
          <div class="star-rating">
            <i class="fa-regular fa-star" data-rating="1"></i>
            <i class="fa-regular fa-star" data-rating="2"></i>
            <i class="fa-regular fa-star" data-rating="3"></i>
            <i class="fa-regular fa-star" data-rating="4"></i>
            <i class="fa-regular fa-star" data-rating="5"></i>
          </div>
          <input type="hidden" name="rating" id="rating-value" value="0">
        </div>

        <div class="mb-3">
          <label for="fileUpload" class="form-label fw-bold">Attach a file (optional)</label>
          <input class="form-control" type="file" id="fileUpload">
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="anonymous">
          <label class="form-check-label" for="anonymous">
            Submit anonymously
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-100">Submit Feedback</button>
        <div id="statusMessage" class="mt-3"></div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.0.0/dist/js/coreui.bundle.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
