<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Connect - Announcements</title>
    <link rel="stylesheet" href="announcement.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>News and Announcements</h1>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="academic">Academic</button>
                <button class="filter-btn" data-filter="events">Events</button>
            </div>
        </header>

        <div class="announcement-grid">
            <!-- Announcement cards will be dynamically inserted here -->
        </div>

        <!-- Admin controls (visible only to admin) -->
        <div class="admin-controls">
            <button id="add-announcement-btn" class="admin-btn">
                <i class="fas fa-plus"></i> Add Announcement
            </button>
        </div>
    </div>

    <!-- Modal for announcement details -->
    <div id="announcement-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body">
                <!-- Content will be dynamically inserted -->
            </div>
        </div>
    </div>

    <!-- Modal for adding new announcement (admin only) -->
    <div id="add-announcement-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Add New Announcement</h2>
            <form id="announcement-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="academic">Academic</option>
                        <option value="events">Events</option>
                        <option value="general">General</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Publish Announcement</button>
            </form>
        </div>
    </div>

    <script src="announcement.js"></script>
</body>
</html>
