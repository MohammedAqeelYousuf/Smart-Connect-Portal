<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Campus Connect Portal</title>
    <link rel="stylesheet" href="../styles/index.css" />
    <link rel="stylesheet" href="../styles/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Navbar Section -->
      <header>
        <nav class="navbar navbar-bg text-white">
          <div class="container-fluid">
            <a class="navbar-brand text-white">Connect Portal</a>
            <div>
              <a class="text-decoration-none" href="#login">
                <button
                  id="login-button"
                  class="btn btn-outline-success"
                  onclick="navigateTo('/login')"
                >
                  Login
                </button>
              </a>
              <a class="text-decoration-none" href="#register">
                <button
                  id="signup-button"
                  class="btn btn-outline-primary"
                  onclick="navigateTo('/register')"
                >
                  Register
                </button>
              </a>
            </div>
          </div>
        </nav>
      </header>

      <main>
        <!-- Dynamic Content -->
      </main>
      </div>
      <!-- Footer Section -->
      <footer class="bg-dark text-white py-3">
        <div class="container text-center">
          <p>&copy; 2025 Connect Portal. All rights reserved.</p>
          <ul class="list-inline">
            <li class="list-inline-item">
              <a href="/contact.html" class="text-decoration-none">Contact</a>
            </li>
            <li class="list-inline-item">
              <a href="/privacy-policy.html" class="text-decoration-none"
                >Privacy Policy</a
              >
            </li>
            <li class="list-inline-item">
              <a href="/terms.html" class="text-decoration-none"
                >Terms of Service</a
              >
            </li>
          </ul>
        </div>
      </footer>
      <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"
      ></script>
      <script>
        const routes = {
          "/": "index.html",
          "/login": "/pages/auth/login.html",
          "/register": "/pages/auth/register.html"
        };

        function navigateTo(path) {
          const main = document.querySelector("main");
          fetch(routes[path] || routes["/"])
            .then((response) => response.text())
            .then((html) => {
              main.innerHTML = html;

              // Find any <script> tags in the fetched HTML
              const tempDiv = document.createElement("div");
              tempDiv.innerHTML = html;
              const scripts = tempDiv.querySelectorAll("script");

              scripts.forEach((script) => {
                const newScript = document.createElement("script");
                if (script.src) {
                  // External script
                  newScript.src = script.src;
                } else {
                  // Inline script
                  newScript.textContent = script.textContent;
                }
                document.body.appendChild(newScript); // Or use main.appendChild if scoped
              });
            })
            .catch((error) => {
              console.error("Error loading page:", error);
              main.innerHTML = "<h1>Error loading page</h1>";
            });
        }
        
        navigateTo("/");
      </script>
    </div>
  </body>
</html>
